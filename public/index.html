<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF7F4" />
    <title>Bridge Call — Phone calls, written for you</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --ink: #1c1410;
            --ink-2: #4a3f38;
            --ink-muted: #7a6e66;
            --ink-faint: #a89d95;
            --line: #ebe3db;
            --line-strong: #ddd2c6;
            --surface: #faf7f4;
            --surface-2: #f3ede6;
            --surface-3: #ebe4db;
            --accent: #d4551f;
            --accent-hover: #b84818;
            --accent-soft: #fdf0e8;
            --accent-ring: rgba(212, 85, 31, 0.2);
            --them-bubble: #ebe4db;
            --ok: #2d6a4f;
            --live: #d4551f;
            --err: #b42318;
            --font: "DM Sans", system-ui, sans-serif;
            --display: "Fraunces", Georgia, serif;
            --radius: 14px;
            --radius-sm: 10px;
            --safe-b: env(safe-area-inset-bottom, 0px);
            --safe-t: env(safe-area-inset-top, 0px);
            --nav-h: 58px;
            --topbar-h: 52px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: var(--font);
            color: var(--ink);
            background: var(--surface);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            background: var(--surface);
            position: relative;
        }

        /* ---- Sidebar / drawer ---- */
        .sidebar {
            width: 280px;
            flex: none;
            background: var(--surface-2);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            z-index: 40;
        }
        .sidebar-head { padding: 20px 16px 12px; }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--display);
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .brand .mark {
            width: 32px; height: 32px;
            border-radius: 9px;
            background: var(--accent);
            display: grid; place-items: center;
            flex: none;
        }
        .brand .mark svg { width: 16px; height: 16px; color: #fff; }

        .new-btn {
            width: 100%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: background 0.15s;
        }
        .new-btn:hover { background: var(--accent-hover); }
        .new-btn svg { width: 16px; height: 16px; }

        .list-title {
            padding: 14px 18px 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--ink-faint);
        }
        .chat-list { flex: 1; overflow-y: auto; padding: 2px 8px 16px; -webkit-overflow-scrolling: touch; }
        .chat-list .empty-list {
            color: var(--ink-muted);
            font-size: 13px;
            text-align: center;
            padding: 28px 14px;
            line-height: 1.55;
        }

        .chat-item {
            position: relative;
            display: flex;
            gap: 10px;
            padding: 10px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.12s;
        }
        .chat-item:hover { background: var(--surface-3); }
        .chat-item.active { background: var(--accent-soft); }
        .chat-item .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--line);
            display: grid; place-items: center;
            flex: none;
            color: var(--accent);
        }
        .chat-item .avatar svg { width: 15px; height: 15px; }
        .chat-item .ci-body { min-width: 0; flex: 1; }
        .chat-item .ci-top { display: flex; align-items: baseline; gap: 6px; }
        .chat-item .ci-title {
            font-weight: 600;
            font-size: 13.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .chat-item .ci-time { font-size: 11px; color: var(--ink-faint); flex: none; }
        .chat-item .ci-preview {
            font-size: 12px;
            color: var(--ink-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .ci-status {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 600; margin-top: 3px;
        }
        .ci-status .dot { width: 6px; height: 6px; border-radius: 50%; }
        .ci-status.calling, .ci-status.live { color: var(--live); }
        .ci-status.calling .dot, .ci-status.live .dot { background: var(--live); animation: pulse 1.4s infinite; }
        .ci-status.ended { color: var(--ink-faint); }
        .ci-status.ended .dot { background: var(--ink-faint); }

        .chat-item .del {
            position: absolute; top: 6px; right: 6px;
            width: 28px; height: 28px;
            border: none; background: transparent; color: var(--ink-faint);
            border-radius: 6px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            font-size: 18px; line-height: 1;
        }
        .chat-item:hover .del, .chat-item .del:focus { display: flex; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 85, 31, 0.45); }
            70% { box-shadow: 0 0 0 6px rgba(212, 85, 31, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 85, 31, 0); }
        }

        .drawer-backdrop {
            display: none;
            position: fixed; inset: 0;
            background: rgba(28, 20, 16, 0.4);
            z-index: 35;
        }
        .drawer-backdrop.open { display: block; }

        /* ---- Main panel ---- */
        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            position: relative;
        }

        /* Mobile top bar */
        .mobile-topbar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: calc(10px + var(--safe-t)) 14px 10px;
            border-bottom: 1px solid var(--line);
            background: var(--surface);
            flex: none;
            min-height: var(--topbar-h);
        }
        .mobile-topbar .back-btn, .mobile-topbar .menu-btn {
            width: 40px; height: 40px;
            border: none; background: var(--surface-2);
            border-radius: var(--radius-sm);
            display: grid; place-items: center;
            cursor: pointer; color: var(--ink);
            flex: none;
        }
        .mobile-topbar .back-btn svg, .mobile-topbar .menu-btn svg { width: 20px; height: 20px; }
        .mobile-topbar .mt-title {
            flex: 1; min-width: 0;
            font-weight: 600; font-size: 15px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Mobile bottom nav */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + var(--safe-b));
            padding-bottom: var(--safe-b);
            background: var(--surface);
            border-top: 1px solid var(--line);
            z-index: 30;
        }
        .mobile-nav-inner {
            display: flex;
            height: var(--nav-h);
            max-width: 1200px;
            margin: 0 auto;
        }
        .nav-tab {
            flex: 1;
            border: none;
            background: none;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            padding: 6px;
        }
        .nav-tab svg { width: 22px; height: 22px; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab .badge {
            position: absolute;
            top: 6px; right: calc(50% - 22px);
            min-width: 16px; height: 16px;
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 8px;
            display: grid; place-items: center;
            padding: 0 4px;
        }
        .nav-tab-wrap { position: relative; flex: 1; display: flex; }

        /* ---- Home view ---- */
        .home-wrap {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .home-inner {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 24px 40px;
        }
        .home-eyebrow {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }
        .home-inner h1 {
            font-family: var(--display);
            font-size: clamp(28px, 6vw, 36px);
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin: 0 0 16px;
            color: var(--ink);
        }
        .home-lead {
            font-size: 16px;
            color: var(--ink-2);
            margin: 0 0 28px;
            line-height: 1.6;
        }
        .icp-cards {
            display: grid;
            gap: 12px;
            margin-bottom: 32px;
        }
        .icp-card {
            display: flex;
            gap: 14px;
            padding: 16px;
            background: var(--surface-2);
            border: 1px solid var(--line);
            border-radius: var(--radius);
        }
        .icp-card .icp-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: var(--accent-soft);
            color: var(--accent);
            display: grid; place-items: center;
            flex: none;
        }
        .icp-card .icp-icon svg { width: 20px; height: 20px; }
        .icp-card h3 {
            margin: 0 0 4px;
            font-size: 14px;
            font-weight: 600;
        }
        .icp-card p {
            margin: 0;
            font-size: 13.5px;
            color: var(--ink-muted);
            line-height: 1.5;
        }

        .steps {
            margin-bottom: 32px;
        }
        .steps h2 {
            font-family: var(--display);
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 16px;
        }
        .step {
            display: flex;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
        }
        .step:last-child { border-bottom: none; }
        .step-num {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--ink);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: grid; place-items: center;
            flex: none;
        }
        .step-body strong { display: block; font-size: 14px; margin-bottom: 2px; }
        .step-body span { font-size: 13.5px; color: var(--ink-muted); }

        .home-cta {
            width: 100%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 600;
            padding: 15px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            transition: background 0.15s;
        }
        .home-cta:hover { background: var(--accent-hover); }
        .home-cta svg { width: 18px; height: 18px; }

        .home-foot {
            margin-top: 20px;
            text-align: center;
            font-size: 12.5px;
            color: var(--ink-faint);
        }

        /* ---- Form view ---- */
        .form-wrap {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .form-inner {
            max-width: 520px;
            margin: 0 auto;
            padding: 32px 24px 40px;
        }
        .form-inner h1 {
            font-family: var(--display);
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 6px;
            letter-spacing: -0.02em;
        }
        .form-inner .sub {
            color: var(--ink-muted);
            margin: 0 0 24px;
            font-size: 14.5px;
            line-height: 1.55;
        }

        .form-section {
            margin-bottom: 22px;
            padding-bottom: 22px;
            border-bottom: 1px solid var(--line);
        }
        .form-section:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .form-section-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 14px;
        }

        form#call-form { display: grid; gap: 16px; }
        .field label {
            display: block;
            font-weight: 600;
            font-size: 13.5px;
            margin-bottom: 5px;
        }
        .field label .req { color: var(--accent); }
        .field .hint {
            font-weight: 400;
            color: var(--ink-muted);
            font-size: 12.5px;
            margin-bottom: 7px;
            line-height: 1.45;
        }

        input[type="tel"], input[type="text"], textarea, select {
            width: 100%;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius-sm);
            padding: 12px 13px;
            font-size: 16px; /* prevents iOS zoom */
            font-family: inherit;
            color: var(--ink);
            background: #fff;
            transition: border-color 0.15s, box-shadow 0.15s;
            -webkit-appearance: none;
        }
        input::placeholder, textarea::placeholder { color: var(--ink-faint); }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-ring);
        }
        textarea { resize: vertical; min-height: 84px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        button.submit {
            border: none;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            width: 100%;
            transition: background 0.15s;
        }
        button.submit:hover:not(:disabled) { background: var(--accent-hover); }
        button.submit:disabled { opacity: 0.6; cursor: not-allowed; }
        button.submit svg { width: 17px; height: 17px; }
        .spinner {
            width: 16px; height: 16px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .alert {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-weight: 500;
            display: none;
        }
        .alert.show { display: block; }
        .alert.error { background: #fef3f2; color: var(--err); border: 1px solid #fecdca; }

        /* ---- Chat view ---- */
        .chat-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .chat-head {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
            background: var(--surface);
            flex: none;
        }
        .chat-head .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--line);
            display: grid; place-items: center;
            color: var(--accent);
            flex: none;
        }
        .chat-head .avatar svg { width: 18px; height: 18px; }
        .chat-head .ch-info { min-width: 0; flex: 1; }
        .chat-head .ch-title {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-head .ch-sub {
            font-size: 12.5px;
            color: var(--ink-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11.5px;
            font-weight: 600;
            flex: none;
            white-space: nowrap;
        }
        .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
        .status-pill.calling, .status-pill.live { background: var(--accent-soft); color: var(--accent); }
        .status-pill.calling .dot, .status-pill.live .dot { background: var(--live); animation: pulse 1.4s infinite; }
        .status-pill.ended { background: var(--surface-2); color: var(--ink-muted); }
        .status-pill.ended .dot { background: var(--ink-faint); }

        .transcript {
            flex: 1;
            overflow-y: auto;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--surface);
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .transcript .empty {
            color: var(--ink-muted);
            font-size: 14px;
            text-align: center;
            margin: auto;
            max-width: 260px;
            line-height: 1.55;
        }
        .bubble {
            max-width: 85%;
            padding: 10px 13px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .bubble .who {
            display: block;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.03em;
            opacity: 0.7;
            margin-bottom: 3px;
        }
        .bubble.agent {
            align-self: flex-end;
            color: #fff;
            background: var(--accent);
            border-bottom-right-radius: 4px;
        }
        .bubble.agent .who { color: rgba(255,255,255,0.8); }
        .bubble.other {
            align-self: flex-start;
            background: var(--them-bubble);
            color: var(--ink);
            border-bottom-left-radius: 4px;
        }
        .bubble.other .who { color: var(--ink-muted); }

        .asks { flex: none; }
        .asks:not(:empty) {
            padding: 12px 16px calc(12px + var(--safe-b));
            border-top: 1px solid var(--line);
            background: var(--accent-soft);
            max-height: 45%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .ask {
            border: 1px solid var(--line-strong);
            background: #fff;
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 10px;
        }
        .ask:last-child { margin-bottom: 0; }
        .ask .ask-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
            display: block;
        }
        .ask .ask-q { font-weight: 500; font-size: 14px; margin-bottom: 10px; line-height: 1.45; }
        .ask .ask-a { color: var(--ink-muted); font-size: 14px; }
        .ask.answered { background: var(--surface-2); }
        .ask-form { display: flex; gap: 8px; }
        .ask-input {
            flex: 1;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius-sm);
            padding: 11px 12px;
            font-size: 16px;
            font-family: inherit;
            min-width: 0;
        }
        .ask-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
        .ask-send {
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            padding: 0 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            flex: none;
            min-height: 44px;
        }
        .ask-send:hover:not(:disabled) { background: var(--accent-hover); }
        .ask-send:disabled { opacity: 0.6; }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            body { background: var(--surface); }
            .app {
                flex-direction: column;
                max-width: none;
                padding-bottom: calc(var(--nav-h) + var(--safe-b));
            }

            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                width: min(300px, 88vw);
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                box-shadow: none;
            }
            .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(28,20,16,0.15); }

            .mobile-topbar { display: flex; }
            .mobile-nav { display: block; }

            .main { flex: 1; min-height: 0; }

            .home-inner { padding: 28px 20px 32px; }
            .form-inner { padding: 24px 18px 32px; }
            .row { grid-template-columns: 1fr; }

            .chat-head { padding: 10px 14px; }
            .chat-head .avatar { display: none; }
            .status-pill { font-size: 10.5px; padding: 4px 8px; }

            .chat-item .del { display: flex; }

            /* Chat view: hide bottom nav, full height */
            .app.in-chat { padding-bottom: 0; }
            .app.in-chat .mobile-nav { display: none; }
            .app.in-chat .asks:not(:empty) { padding-bottom: calc(12px + var(--safe-b)); }
        }

        @media (min-width: 769px) {
            .app {
                margin: 16px auto;
                height: calc(100% - 32px);
                border-radius: 16px;
                border: 1px solid var(--line);
                overflow: hidden;
            }
            body { padding: 0; background: var(--surface-3); }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="drawer-backdrop" id="drawer-backdrop"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-head">
                <div class="brand">
                    <span class="mark">

    <!-- Home template -->
    <template id="tpl-home">
        <div class="home-wrap">
            <div class="home-inner">
                <p class="home-eyebrow">Phone calls, written for you</p>
                <h1>Can't call? Don't speak the language? We call for you.</h1>
                <p class="home-lead">
                    Bridge Call connects you to any business by phone — without speaking or listening.
                    An AI agent makes the call in the right language while you follow the entire conversation as live text.
                </p>

                <div class="icp-cards">
                    <div class="icp-card">
                        <div class="icp-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        </div>
                        <div>
                            <h3>Deaf &amp; hard of hearing</h3>
                            <p>Phone calls aren't accessible when you can't hear. Read every word of the conversation in real time — and answer questions by typing.</p>
                        </div>
                    </div>
                    <div class="icp-card">
                        <div class="icp-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        </div>
                        <div>
                            <h3>Don't speak the local language</h3>
                            <p>Need to book a doctor, bank, or government office abroad? The agent speaks their language fluently — you stay in yours.</p>
                        </div>

                <div class="steps">
                    <h2>How it works</h2>
                    <div class="step">
                        <span class="step-num">1</span>
                        <div class="step-body">
                            <strong>Tell us what you need</strong>
                            <span>Enter the phone number, describe your request, and add your name. The agent calls on your behalf.</span>
                        </div>
                    </div>
                    <div class="step">
                        <span class="step-num">2</span>

                        <span class="step-num">3</span>

                <button class="home-cta" id="home-cta">

                    Start a call

                <p class="home-foot">No account needed. Your call history stays on this device.</p>

    <!-- Form template -->
    <template id="tpl-form">
        <div class="form-wrap">
            <div class="form-inner">
                <h1>Start a call</h1>
                <p class="sub">Your AI agent will call the number, handle the conversation in the right language, and stream every word back to you as text.</p>
                <div class="alert error" id="alert" role="alert" aria-live="assertive"></div>
                <form id="call-form" autocomplete="off">
                    <div class="form-section">
                        <div class="form-section-title">Who to call</div>
                        <div class="field">
                            <label for="to">Phone number <span class="req">*</span></label>
                            <div class="hint">Include country code — e.g. +972 52 123 4567 or +1 415 555 0123</div>
                            <input type="tel" id="to" placeholder="+1 415 555 0123" required inputmode="tel" />
                        </div>
                    </div>
                    <div class="form-section">
                        <div class="form-section-title">What you need</div>
                        <div class="field">
                            <label for="task">Your request <span class="req">*</span></label>
                            <div class="hint">Write it like you'd tell a friend — the agent will say this on the call.</div>
                            <textarea id="task" placeholder="e.g. Schedule a bank appointment for tomorrow at 5pm. Ask what documents I need to bring." required></textarea>
                        </div>
                    </div>
                    <div class="form-section">
                        <div class="form-section-title">About you</div>
                        <div class="row">
                            <div class="field">
                                <label for="userName">Your name <span class="req">*</span></label>
                                <div class="hint">The agent introduces itself on your behalf.</div>
                                <input type="text" id="userName" placeholder="e.g. Sarah Cohen" required />
                            </div>
                            <div class="field">
                                <label for="language">Call language</label>
                                <div class="hint">Language spoken to the business.</div>
                                <select id="language">
                                    <option value="">Auto-detect</option>
                                    <option value="en-US">English</option>
                                    <option value="he-IL">Hebrew</option>
                                    <option value="ar-SA">Arabic</option>
                                    <option value="es-ES">Spanish</option>
                                    <option value="fr-FR">French</option>
                                    <option value="de-DE">German</option>
                                    <option value="ru-RU">Russian</option>
                                </select>
                            </div>
                        </div>
                        <div class="field">
                            <label for="additionalInfo">Extra details</label>
                            <div class="hint">Availability, ID numbers, preferences — anything that helps the agent.</div>
                            <textarea id="additionalInfo" placeholder="e.g. Available weekdays after 5pm. Account number 4821."></textarea>
                        </div>
                    </div>
                    <button type="submit" class="submit" id="submit-btn">
                        <span class="spinner" id="spinner"></span>
                        <svg id="submit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        <span id="submit-label">Place the call</span>
                    </button>
                </form>
            </div>
        </div>
    </template>

    <script>
        const STORAGE_KEY = "bridgecall.chats.v1";
        const PHONE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';

        const appEl = document.getElementById("app");
        const mainEl = document.getElementById("main");
        const listEl = document.getElementById("chat-list");
        const sidebar = document.getElementById("sidebar");
        const backdrop = document.getElementById("drawer-backdrop");
        const mtTitle = document.getElementById("mt-title");
        const backBtn = document.getElementById("back-btn");
        const menuBtn = document.getElementById("menu-btn");
        const callsBadge = document.getElementById("calls-badge");

        let chats = loadChats();
        let activeId = null;
        let currentView = "home"; // home | form | chat | calls-drawer
        const streams = new Map();

        // ---------- persistence ----------
        function loadChats() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch { return []; }
        }
        let saveTimer = null;
        function saveChats() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); } catch {}
            updateBadge();
        }
        function saveSoon() {
            if (saveTimer) return;
            saveTimer = setTimeout(() => { saveTimer = null; saveChats(); }, 800);
        }
        function getChat(id) { return chats.find((c) => c.id === id); }

        // ---------- helpers ----------
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
        }
        function fmtTime(ts) {
            const d = new Date(ts), now = new Date();
            return d.toDateString() === now.toDateString()
                ? d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
                : d.toLocaleDateString([], { month: "short", day: "numeric" });
        }
        function statusLabel(s) {
            return s === "calling" ? "Calling…" : s === "live" ? "On call" : "Ended";
        }
        function previewOf(chat) {
            if (chat.transcript?.length) {
                const last = chat.transcript[chat.transcript.length - 1];
                return (last.role === "agent" ? "Agent: " : "Them: ") + last.content;
            }
            return chat.task || chat.to;
        }
        function titleOf(chat) { return chat.task || ("Call to " + chat.to); }

        function isMobile() { return window.innerWidth <= 768; }

        function openDrawer() {
            sidebar.classList.add("open");
            backdrop.classList.add("open");
        }
        function closeDrawer() {
            sidebar.classList.remove("open");
            backdrop.classList.remove("open");
        }

        function setNavActive(view) {
            document.querySelectorAll(".nav-tab").forEach((t) => {
                t.classList.toggle("active", t.dataset.view === view);
            });
        }

        function updateTopbar() {
            if (!isMobile()) {
                backBtn.style.display = "none";
                menuBtn.style.display = "none";
                mtTitle.textContent = "Bridge Call";
                return;
            }
            menuBtn.style.display = currentView === "chat" ? "none" : "flex";
            backBtn.style.display = (currentView === "chat" || currentView === "form") ? "flex" : "none";

            if (currentView === "home") mtTitle.textContent = "Bridge Call";
            else if (currentView === "form") mtTitle.textContent = "New call";
            else if (currentView === "chat" && activeId) {
                const chat = getChat(activeId);
                mtTitle.textContent = chat ? titleOf(chat) : "Call";
            } else mtTitle.textContent = "Your calls";
        }

        function updateBadge() {
            const live = chats.filter((c) => c.status !== "ended").length;
            if (live > 0) {
                callsBadge.textContent = live;
                callsBadge.style.display = "grid";
            } else {
                callsBadge.style.display = "none";
            }
        }

        appEl.classList.toggle("in-chat", currentView === "chat");

        // ---------- sidebar ----------
        function renderSidebar() {
            if (!chats.length) {
                listEl.innerHTML = '<div class="empty-list">No calls yet.<br>Tap <strong>New call</strong> to get started.</div>';
                return;
            }
            listEl.innerHTML = "";
            for (const chat of chats) {
                const item = document.createElement("div");
                item.className = "chat-item" + (chat.id === activeId ? " active" : "");
                item.innerHTML =
                    '<div class="avatar">' + PHONE_SVG + '</div>' +
                    '<div class="ci-body">' +
                        '<div class="ci-top">' +
                            '<span class="ci-title">' + escapeHtml(titleOf(chat)) + '</span>' +
                            '<span class="ci-time">' + fmtTime(chat.createdAt) + '</span>' +
                        '</div>' +
                        '<div class="ci-preview">' + escapeHtml(previewOf(chat)) + '</div>' +
                        '<div class="ci-status ' + chat.status + '"><span class="dot"></span>' + statusLabel(chat.status) + '</div>' +
                    '</div>' +
                    '<button class="del" title="Delete" aria-label="Delete">&times;</button>';
                item.addEventListener("click", (e) => {
                    if (e.target.closest(".del")) { e.stopPropagation(); deleteChat(chat.id); return; }
                    openChat(chat.id);
                    closeDrawer();
                });
                listEl.appendChild(item);
            }
            updateBadge();
        }

        function deleteChat(id) {
            streams.get(id)?.close();
            streams.delete(id);
            chats = chats.filter((c) => c.id !== id);
            saveChats();
            if (activeId === id) showHome();
            renderSidebar();
        }

        // ---------- views ----------
        function showHome() {
            activeId = null;
            currentView = "home";
            appEl.classList.remove("in-chat");
            setNavActive("home");
            updateTopbar();
            renderSidebar();
            mainEl.innerHTML = "";
            const node = document.getElementById("tpl-home").content.cloneNode(true);
            mainEl.appendChild(node);
            mainEl.querySelector("#home-cta").addEventListener("click", showForm);
        }

        function showForm() {
            activeId = null;
            currentView = "form";
            appEl.classList.remove("in-chat");
            setNavActive("form");
            updateTopbar();
            renderSidebar();
            mainEl.innerHTML = "";
            mainEl.appendChild(document.getElementById("tpl-form").content.cloneNode(true));
            wireForm();
            closeDrawer();
        }

        function wireForm() {
            const form = mainEl.querySelector("#call-form");
            const alertBox = mainEl.querySelector("#alert");
            const submitBtn = mainEl.querySelector("#submit-btn");
            const spinner = mainEl.querySelector("#spinner");
            const submitIcon = mainEl.querySelector("#submit-icon");
            const submitLabel = mainEl.querySelector("#submit-label");

            function setLoading(on) {
                submitBtn.disabled = on;
                spinner.style.display = on ? "inline-block" : "none";
                submitIcon.style.display = on ? "none" : "inline-block";
                submitLabel.textContent = on ? "Placing call…" : "Place the call";
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                alertBox.classList.remove("show");
                const payload = {
                    to: mainEl.querySelector("#to").value.trim(),
                    task: mainEl.querySelector("#task").value.trim(),
                    userName: mainEl.querySelector("#userName").value.trim(),
                    additionalInfo: mainEl.querySelector("#additionalInfo").value.trim(),
                    language: mainEl.querySelector("#language").value,
                };
                setLoading(true);
                try {
                    const res = await fetch("/api/call", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || "Could not place the call");

                    const chat = {
                        id: data.id,
                        to: payload.to,
                        task: payload.task,
                        userName: payload.userName,
                        additionalInfo: payload.additionalInfo,
                        language: payload.language,
                        createdAt: Date.now(),
                        status: "calling",
                        transcript: [],
                        asks: [],
                    };
                    chats.unshift(chat);
                    saveChats();
                    openChat(chat.id);
                    streamChat(chat.id);
                } catch (err) {
                    alertBox.textContent = err.message;
                    alertBox.classList.add("show");
                    setLoading(false);
                }
            });
        }

        function openChat(id) {
            activeId = id;
            currentView = "chat";
            appEl.classList.add("in-chat");
            setNavActive("calls");
            updateTopbar();
            renderSidebar();
            const chat = getChat(id);
            if (!chat) { showHome(); return; }

            mainEl.innerHTML =
                '<div class="chat-view">' +
                    '<div class="chat-head">' +
                        '<div class="avatar">' + PHONE_SVG + '</div>' +
                        '<div class="ch-info">' +
                            '<div class="ch-title">' + escapeHtml(titleOf(chat)) + '</div>' +
                            '<div class="ch-sub">' + escapeHtml(chat.to) + (chat.userName ? ' · for ' + escapeHtml(chat.userName) : '') + '</div>' +
                        '</div>' +
                        '<span class="status-pill ' + chat.status + '" id="status-pill"><span class="dot"></span>' + statusLabel(chat.status) + '</span>' +
                    '</div>' +
                    '<div class="transcript" id="transcript"></div>' +
                    '<div class="asks" id="asks"></div>' +
                '</div>';

            renderTranscript(chat);
            renderAsks(chat);
            if (chat.status !== "ended" && !streams.has(id)) streamChat(id);
            closeDrawer();
        }

        function isActive(id) { return activeId === id; }

        function updateStatusPill(chat) {
            const pill = mainEl.querySelector("#status-pill");
            if (!pill) return;
            pill.className = "status-pill " + chat.status;
            pill.innerHTML = '<span class="dot"></span>' + statusLabel(chat.status);
        }

        function renderTranscript(chat) {
            const el = mainEl.querySelector("#transcript");
            if (!el) return;
            if (!chat.transcript?.length) {
                el.innerHTML = '<span class="empty">' +
                    (chat.status === "ended"
                        ? "No conversation was recorded."
                        : "The call is connecting…\nWords will appear here as they're spoken.") +
                    '</span>';
                return;
            }
            const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
            el.innerHTML = "";
            for (const item of chat.transcript) {
                const isAgent = item.role === "agent";
                const div = document.createElement("div");
                div.className = "bubble " + (isAgent ? "agent" : "other");
                div.innerHTML = '<span class="who">' + (isAgent ? "Your AI agent" : "Them") + "</span>" + escapeHtml(item.content || "");
                el.appendChild(div);
            }
            if (atBottom) el.scrollTop = el.scrollHeight;
        }

        function renderAsks(chat) {
            const el = mainEl.querySelector("#asks");
            if (!el) return;
            el.innerHTML = "";
            for (const ask of (chat.asks || [])) {
                const card = document.createElement("div");
                card.className = "ask" + (ask.answer != null ? " answered" : "");
                card.innerHTML = '<div class="ask-q"><span class="ask-label">Agent needs your answer</span>' + escapeHtml(ask.question) + '</div>';

                if (ask.answer != null) {
                    const a = document.createElement("div");
                    a.className = "ask-a";
                    a.innerHTML = '<span class="ask-label">You answered</span>' + escapeHtml(ask.answer);
                    card.appendChild(a);
                } else {
                    const formEl = document.createElement("form");
                    formEl.className = "ask-form";
                    formEl.innerHTML =
                        '<input type="text" class="ask-input" placeholder="Type your answer…" autocomplete="off" required />' +
                        '<button type="submit" class="ask-send">Send</button>';
                    card.appendChild(formEl);
                    const input = formEl.querySelector(".ask-input");
                    const sendBtn = formEl.querySelector(".ask-send");
                    formEl.addEventListener("submit", async (ev) => {
                        ev.preventDefault();
                        const answer = input.value.trim();
                        if (!answer) return;
                        input.disabled = true; sendBtn.disabled = true;
                        try {
                            const res = await fetch("/api/answer", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ questionId: ask.questionId, answer }),
                            });
                            if (!res.ok) throw new Error("Could not send your answer");
                            ask.answer = answer;
                            saveChats();
                            renderAsks(chat);
                        } catch (err) {
                            input.disabled = false; sendBtn.disabled = false;
                            alert(err.message);
                        }
                    });
                }
                el.appendChild(card);
            }
            const open = el.querySelector(".ask:not(.answered) .ask-input");
            if (open) open.focus();
        }

        // ---------- streaming ----------
        function streamChat(id) {
            if (streams.has(id)) return;
            const es = new EventSource("/api/stream/" + encodeURIComponent(id));
            streams.set(id, es);

            es.addEventListener("transcript", (e) => {
                const chat = getChat(id);
                if (!chat) return;
                chat.transcript = JSON.parse(e.data).transcript || [];
                if (chat.status === "calling" && chat.transcript.length) chat.status = "live";
                saveSoon();
                renderSidebar();
                if (isActive(id)) { updateStatusPill(chat); renderTranscript(chat); updateTopbar(); }
            });

            es.addEventListener("question", (e) => {
                const chat = getChat(id);
                if (!chat) return;
                const { questionId, question } = JSON.parse(e.data);
                if (!chat.asks.some((a) => a.questionId === questionId)) {
                    chat.asks.push({ questionId, question, answer: null });
                    saveChats();
                    if (isActive(id)) renderAsks(chat);
                }
            });

            es.addEventListener("ended", () => {
                const chat = getChat(id);
                if (chat) {
                    chat.status = "ended";
                    saveChats();
                    renderSidebar();
                    if (isActive(id)) updateStatusPill(chat);
                }
                closeStream(id);
            });

            es.onerror = () => { if (es.readyState === EventSource.CLOSED) closeStream(id); };
        }
        function closeStream(id) {
            streams.get(id)?.close();
            streams.delete(id);
        }

        async function resumeActive() {
            for (const chat of chats) {
                if (chat.status === "ended") continue;
                try {
                    const res = await fetch("/api/call/" + encodeURIComponent(chat.id));
                    if (res.ok) {
                        const d = await res.json();
                        if (d.status?.state === "Terminated") chat.status = "ended";
                    }
                } catch {}
                if (chat.status !== "ended") streamChat(chat.id);
            }
            saveChats();
            renderSidebar();
        }

        // ---------- nav wiring ----------
        document.getElementById("new-btn").addEventListener("click", showForm);
        backdrop.addEventListener("click", closeDrawer);
        menuBtn.addEventListener("click", openDrawer);
        backBtn.addEventListener("click", () => {
            if (currentView === "chat") showHome();
            else if (currentView === "form") showHome();
        });

        document.getElementById("nav-home").addEventListener("click", () => { showHome(); closeDrawer(); });
        document.getElementById("nav-calls").addEventListener("click", () => {
            if (isMobile()) openDrawer();
            else if (chats.length) openChat(chats[0].id);
            else showForm();
        });
        document.getElementById("nav-new").addEventListener("click", showForm);

        window.addEventListener("resize", updateTopbar);

        // ---------- init ----------
        renderSidebar();
        showHome();
        resumeActive();
    </script>
</body>
</html>
